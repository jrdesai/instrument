<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0d0e1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!--
    Both characters span y=262 to y=762 (500px, vertically centered at y=512).
    Stroke-width=60 means round linecaps add 30px overhang at each endpoint,
    so the > path endpoints are inset by 30px: y=292 to y=732.
  -->

  <!-- > chevron -->
  <path d="M 290 292 L 530 512 L 290 732"
        stroke="url(#fg)" stroke-width="60"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- I — plain stem, no serifs -->
  <rect x="590" y="262" width="60" height="500" rx="30" fill="url(#fg)"/>
</svg>
