<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0d0e1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!--
    >I mark centred at (512, 512) with ~10% padding top/bottom (macOS HIG).
    Both characters span y=102–922 (820px = 80% of canvas).
    Stroke-width=64 → round linecap adds ~25px vertical overhang,
    so path endpoints are inset to y=127 and y=897.
  -->

  <!-- > chevron -->
  <path d="M 290 127 L 630 512 L 290 897"
        stroke="url(#fg)" stroke-width="64"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- I — plain stem, no serifs -->
  <rect x="690" y="102" width="64" height="820" rx="32" fill="url(#fg)"/>
</svg>
