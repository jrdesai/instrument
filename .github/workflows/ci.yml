name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript — lint, typecheck, tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Tests
        run: pnpm run test:ts

  rust:
    name: Rust — tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Tests
        run: cargo test --manifest-path src-core/Cargo.toml -p instrument-core -p regex-core

  clippy:
    name: Rust — clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clippy
        run: cargo clippy --manifest-path src-core/Cargo.toml --all-targets -- -D warnings

  web:
    name: Web — Vite build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm exec vite build --mode web

  wasm-sync:
    name: WASM — sync check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-core/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('src-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Rebuild WASM
        run: pnpm run build:wasm

      - name: Check WASM interface is up to date
        run: |
          # Check only the JS/TS interface files — the .wasm binary is non-deterministic
          # between builds (internal metadata differs) so we skip it.
          # What matters for correctness is that the exported JS interface matches the Rust source.
          if ! git diff --exit-code public/wasm-pkg/instrument_web.js \
                                    public/wasm-pkg/instrument_web.d.ts \
                                    public/wasm-pkg/instrument_web_bg.wasm.d.ts \
                                    public/wasm-pkg/package.json; then
            echo ""
            echo "❌ public/wasm-pkg/ interface is out of sync with the Rust source."
            echo "   Run 'pnpm run build:wasm' locally and commit the updated public/wasm-pkg/."
            exit 1
          fi
          echo "✅ public/wasm-pkg/ interface is up to date."
