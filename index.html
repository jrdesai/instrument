<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var prefs = localStorage.getItem("instrument-preferences");
          var theme = prefs ? (JSON.parse(prefs).theme) : "dark";
          if (theme === "dark") document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instrument</title>
    <meta name="description" content="Privacy-first developer toolkit. 34+ tools for encoding, formatting, hashing, JWT, regex, and more — all running locally in your browser." />
    <meta name="theme-color" content="#3b6ef8" />
    <meta property="og:title" content="Instrument" />
    <meta property="og:description" content="Privacy-first developer toolkit. All computation runs locally — nothing leaves your browser." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Instrument" />
    <meta name="twitter:description" content="Privacy-first developer toolkit. All computation runs locally — nothing leaves your browser." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  </head>

  </body>
</html>
